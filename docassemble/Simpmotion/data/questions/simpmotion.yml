#################### Interview order #####################
comment: |
  Controls order and branching logic for questions specific to this form
id: interview_order_simpmotion
code: |
  # Set the allowed courts for this interview
  allowed_courts = interview_metadata["simpmotion"]["allowed courts"]
  nav.set_section('review_simpmotion')
  welcome
  using_this_tool
  navigation_and_saving
  pii_policy
  if pii_policy == False:
    pii_policy_exit
  existing_case
  if existing_case == False:
    existing_case_exit
  set_progress(11)
  probate_case
  if probate_case == True:
    probate_case_exit
  right_tool
  if right_tool == False:
    right_tool_exit
  approved_form
  if approved_form == True:
    approved_form_exit
  speak_to_lawyer
  docket_number
  trial_court
  # Bryce added below as placeholder to be replaced by something for Michigan courts later?
  trial_court.name.text = "Trial Court"
  trial_court.address.county
  court_type
  set_progress(22)
  trial_court.phone_number
  # Below sets the user_role by asking a question.
  # You can set user_role directly instead to either 'plaintiff' or 'defendant'
  user_ask_role
  # user_role
  set_progress(33)
  users.gather()
  multiple_users
  if multiple_users==True:
    first_party_user_side  
    if first_party_user_side.target_number == 1:
      first_party_user_side.gather()
  # this interview already tells us to assume user has no attorney, so presuming that here too, and just getting the user's (or first party on user's side's) address and phone number
  if multiple_users == True and first_party_user_side.target_number ==1:
      first_party_user_side[0].address.address
      first_party_user_side[0].phone_number
  else:
    if user_ask_role == 'plaintiff':
      plaintiffs[0].address.address
      plaintiffs[0].phone_number
    else:
      defendants[0].address.address
      defendants[0].phone_number
  # presents correct version of multiple_other_parties screen depending on user role
  if user_ask_role=='plaintiff':
    user_is_plaintiff_logic
  else:
    user_is_defendant_logic
  if other_parties.target_number == 1:
    other_parties.gather()
  plaintiffs_attorney.target_number
  if plaintiffs_attorney.target_number == 1:
    plaintiffs_attorney.gather()
    plaintiffs_attorney[0].phone_number
    plaintiffs_attorney[0].address.address
    plaintiffs_attorney_bar_number
  set_progress(44)
  if other_parties.there_are_any == True:
    defendants_attorney.target_number
    if defendants_attorney.target_number == 1:
      defendants_attorney.gather()
      defendants_attorney[0].phone_number
      defendants_attorney[0].address.address
      defendants_attorney_bar_number  
  if user_ask_role == 'plaintiff':
    if other_parties.target_number==1 and defendants_attorney.target_number == 0:
      defendants[0].address.address
      defendants[0].phone_number
  else:
    if plaintiffs_attorney.target_number == 0:
      plaintiffs[0].address.address
      plaintiffs[0].phone_number
  set_progress(55)
  motion_title
  motion_body
  has_hearing_info
  if has_hearing_info == True:
    hearing_time
    hearing_at_court
    if hearing_at_court == False:
      hearing_address_on_one_line
    judge.name
    trial_court_bar_number
  if has_hearing_info == False:
    no_hearing_info_ok
  set_progress(66)
  users.gather()
  set_parts(subtitle=str(users))
  signature_date
  users.signature_1
  # Below taken out because we want them to fill in service date afterwards
  # service_date
  # users.signature_2
  interview_order_simpmotion = True
---
###################### Main order ######################
